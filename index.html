<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#111;}

/* ── LIST VIEW ── */
.list-view{padding:24px;}
.list-header{background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;padding:20px 28px;border-radius:12px;margin-bottom:20px;}
.list-header h1{font-size:20px;margin-bottom:4px;}
.list-header p{font-size:13px;color:#b7e4c7;}
.search-bar{display:flex;gap:10px;margin-bottom:16px;}
.search-bar input{flex:1;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:14px;}
.search-bar select{padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:13px;}
.count-badge{font-size:12px;color:#555;margin-bottom:8px;}
.bulk-bar{display:none;align-items:center;gap:12px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 16px;margin-bottom:12px;}
.bulk-bar .sel-count{font-size:13px;font-weight:600;color:#856404;}
.btn-bulk-pdf{background:#c0392b;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
.btn-bulk-pdf:hover{background:#a93226;}
.btn-clear{background:#6c757d;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;}
table.list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.list-table th{background:#1b4332;color:#b7e4c7;padding:10px 14px;font-size:12px;text-align:left;}
.list-table td{padding:9px 14px;font-size:13px;border-bottom:1px solid #f0f0f0;}
.list-table tr:hover td{background:#f8fffe;}
.list-table tr.selected-row td{background:#e8f5e9;}
.list-table td.amount{text-align:right;font-weight:600;}
.list-table td.due-zero{color:#2d6a4f;font-weight:600;text-align:right;}
.list-table td.due-nonzero{color:#c0392b;font-weight:600;text-align:right;}
.list-table input[type=checkbox]{width:15px;height:15px;cursor:pointer;}
.btn-view{background:#2d6a4f;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;}
.btn-view:hover{background:#1b4332;}
.btn-pdf-single{background:#c0392b;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;margin-left:4px;}
.btn-pdf-single:hover{background:#a93226;}
/* progress overlay */
.progress-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.progress-overlay.show{display:flex;}
.progress-box{background:#fff;border-radius:12px;padding:32px 40px;text-align:center;min-width:320px;}
.progress-box h3{margin-bottom:12px;font-size:16px;color:#1b4332;}
.progress-bar-wrap{background:#e0e0e0;border-radius:20px;height:12px;overflow:hidden;margin-bottom:10px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#2d6a4f,#52b788);border-radius:20px;transition:width .3s;}
.progress-txt{font-size:13px;color:#555;}

/* ── INVOICE VIEW ── */
.invoice-view{display:none;padding:24px;}
.inv-controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.btn-back{background:#555;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-print{background:#2d6a4f;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;}
.btn-dl-pdf{background:#c0392b;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
.btn-dl-pdf:hover{background:#a93226;}
.inv-title{font-size:14px;font-weight:bold;color:#1b4332;}

/* ── INVOICE PAGE ── */
.page{background:#fff;width:860px;margin:0 auto;border:1px solid #ccc;}
.top-row{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px 14px;border-bottom:1px solid #ccc;}
.company-block p{font-size:12px;line-height:1.7;}
.company-block p.cname{font-size:14px;font-weight:bold;}
.tax-label{font-size:34px;font-weight:bold;}
.meta-outer{display:flex;border-bottom:1px solid #ccc;}
.meta-left{flex:1;border-right:1px solid #ccc;}
.meta-right{flex:1;}
.meta-pair{display:flex;padding:3px 22px;font-size:12px;}
.meta-pair .k{font-weight:bold;min-width:110px;}
.addr-row{display:flex;border-bottom:1px solid #ccc;}
.addr-cell{flex:1;padding:10px 22px;}
.addr-cell:first-child{border-right:1px solid #ccc;}
.addr-cell .albl{font-weight:bold;font-size:12px;margin-bottom:3px;}
.addr-cell .cname{font-weight:bold;font-size:13px;margin-bottom:2px;}
.addr-cell p{font-size:12px;line-height:1.6;}
.items-tbl{width:100%;border-collapse:collapse;}
.items-tbl th{background:#f2f2f2;border:1px solid #ccc;padding:6px 7px;font-size:10px;font-weight:bold;text-align:left;}
.items-tbl th.c{text-align:center;}.items-tbl th.r{text-align:right;}
.items-tbl td{border:1px solid #ccc;padding:7px 7px;font-size:12px;vertical-align:top;}
.items-tbl td.c{text-align:center;}.items-tbl td.r{text-align:right;}
.items-tbl .iname{font-weight:bold;}
.bot-row{display:flex;border-top:1px solid #ccc;}
.words-blk{flex:1;padding:12px 22px;border-right:1px solid #ccc;}
.words-blk .wlbl{font-weight:bold;font-size:12px;margin-bottom:3px;}
.words-blk .wtxt{font-weight:bold;font-size:12px;line-height:1.5;}
.words-blk .nlbl{font-weight:bold;margin-top:12px;margin-bottom:2px;font-size:12px;}
.words-blk .thnk{font-size:12px;margin-top:10px;}
.seal-wrap{display:flex;flex-direction:column;align-items:center;margin-top:14px;float:right;}
.seal-wrap img{width:140px;height:auto;object-fit:contain;}
.seal-wrap span{font-size:11px;margin-top:3px;}
.tot-blk{width:300px;padding:10px 18px;}
.tot-line{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px dotted #ddd;}
.tot-line.bold{font-weight:bold;}
.tot-line.final{font-weight:bold;font-size:13px;border-top:2px solid #000;border-bottom:2px solid #000;padding:5px 0;margin-top:4px;}
.tot-line.cred{color:#c00;}
.tot-line.bal{font-weight:bold;font-size:13px;border-bottom:none;padding-top:5px;}

@media print{
  body{background:#fff;}
  .inv-controls{display:none!important;}
  .list-view{display:none!important;}
  .invoice-view{display:block!important;padding:0;}
  .page{width:100%;border:none;box-shadow:none;}
}

  <div class="page" id="invoicePage"></div>
</div>

// ── TAX CALCULATION ──
function calcTax(total){
  const ratio = 141481.33/53954.75;
  const install = total/(1.05*ratio+1.18);
  const kit = ratio*install;
  return{
    kit:+kit.toFixed(2),
    install:+install.toFixed(2),
    cgst25:+(kit*0.025).toFixed(2),
    sgst25:+(kit*0.025).toFixed(2),
    cgst9:+(install*0.09).toFixed(6),
    sgst9:+(install*0.09).toFixed(6),
    taxable:+(kit+install).toFixed(2)
  };
}

function fmt(n){return n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtR(n){return '₹'+fmt(n);}

// ── AMOUNT IN WORDS (Indian) ──
const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function numWords(n){
  if(n===0)return'Zero';
  let str='';
  if(n>=10000000){str+=ones[Math.floor(n/10000000)]+' Crore ';n%=10000000;}
  if(n>=100000){str+=numBelow1000(Math.floor(n/100000))+' Lakh ';n%=100000;}
  if(n>=1000){str+=numBelow1000(Math.floor(n/1000))+' Thousand ';n%=1000;}
  if(n>0)str+=numBelow1000(n);
  return str.trim();
}
function numBelow1000(n){
  if(n===0)return'';
  if(n<20)return ones[n]+' ';
  if(n<100)return tens[Math.floor(n/10)]+' '+(n%10?ones[n%10]+' ':'');
  return ones[Math.floor(n/100)]+' Hundred '+(n%100?numBelow1000(n%100):'');
}
function amountWords(total){
  const rupees=Math.floor(total);
  const paise=Math.round((total-rupees)*100);
  let w=numWords(rupees)+' Rupees';
  if(paise>0)w+=' and '+numWords(paise)+' Paise';
  w+=' Only';
  return w;
}

// ── SELECTION ──
let selected=new Set();
let filtered=[...customers];
let currentIdx=null;

function toggleSelectAll(cb){
  filtered.forEach(c=>{
    const idx=customers.indexOf(c);
    if(cb.checked) selected.add(idx); else selected.delete(idx);
  });
  updateBulkBar();
  renderList();
}

function toggleRow(idx,cb){
  if(cb.checked) selected.add(idx); else selected.delete(idx);
  updateBulkBar();
  const row=document.getElementById('row-'+idx);
  if(row) row.classList.toggle('selected-row',cb.checked);
}

function clearSelection(){
  selected.clear();
  updateBulkBar();
  document.getElementById('selectAll').checked=false;
  renderList();
}

function updateBulkBar(){
  const bar=document.getElementById('bulkBar');
  const cnt=selected.size;
  bar.style.display=cnt>0?'flex':'none';
  document.getElementById('selCount').textContent=cnt+' invoice'+(cnt>1?'s':'')+' selected';
}

// ── RENDER LIST ──
function renderList(){
  const tbody=document.getElementById('customerTable');
  tbody.innerHTML='';
  filtered.forEach((c,i)=>{
    const idx=customers.indexOf(c);
    const dueClass=c.due>0?'due-nonzero':'due-zero';
    const dueStr=c.due>0?fmtR(c.due):'₹0.00';
    const chk=selected.has(idx)?'checked':'';
    tbody.innerHTML+=`<tr id="row-${idx}" class="${selected.has(idx)?'selected-row':''}">
      <td><input type="checkbox" ${chk} onchange="toggleRow(${idx},this)"/></td>
      <td>${i+1}</td>
      <td><b>${c.id}</b></td>
      <td>${c.date}</td>
      <td>${c.name}</td>
      <td>${c.mobile||'—'}</td>
      <td class="amount">${fmtR(c.total)}</td>
      <td class="${dueClass}">${dueStr}</td>
      <td>
        <button class="btn-view" onclick="showInvoice(${idx})">View</button>
        <button class="btn-pdf-single" onclick="downloadSinglePDF(${idx})">⬇ PDF</button>
      </td>
    </tr>`;
  });
  document.getElementById('countBadge').textContent=`Showing ${filtered.length} of ${customers.length} customers`;

function filterList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const amt=document.getElementById('amtFilter').value;
  filtered=customers.filter(c=>{
    const matchQ=!q||c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||c.mobile.includes(q)||c.cid.toLowerCase().includes(q);
    const matchAmt=!amt||c.total==amt;
    return matchQ&&matchAmt;
  });
  renderList();
}

async function renderToPDF(c,jsPDFInstance,addPage){
  return new Promise(async(resolve)=>{
    const container=document.getElementById('pdfRenderContainer');
    container.innerHTML=buildInvoiceHTML(c);
    const el=container.firstElementChild;
    // Wait for images (seal) to load
    const imgs=el.querySelectorAll('img');
    await Promise.all([...imgs].map(img=>new Promise(r=>{
      if(img.complete)r(); else{img.onload=r;img.onerror=r;}
    })));
    await new Promise(r=>setTimeout(r,300));
    const canvas=await html2canvas(el,{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:'#ffffff',
      width:el.offsetWidth,
      height:el.offsetHeight,
      windowWidth:el.offsetWidth,
      scrollX:0,
      scrollY:0
    });
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const pdfW=jsPDFInstance.internal.pageSize.getWidth();
    const pdfH=(canvas.height*pdfW)/canvas.width;
    if(addPage) jsPDFInstance.addPage([pdfW,pdfH]);
    jsPDFInstance.addImage(imgData,'JPEG',0,0,pdfW,pdfH);
    container.innerHTML='';
    resolve();
  });
}

async function downloadSinglePDF(idx){
  const c=customers[idx];
  showProgress(true,`Generating PDF for ${c.name}...`,50);
  await new Promise(r=>setTimeout(r,100));
  const {jsPDF}=window.jspdf;
  // Use auto page size based on content
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:[612,850]});
  await renderToPDF(c,doc,false);
  doc.save(`${c.id} - ${c.name}.pdf`);
  showProgress(false);
}

async function downloadCurrentPDF(){
  if(currentIdx===null)return;
  await downloadSinglePDF(currentIdx);
}

async function downloadSelectedPDFs(){
  if(selected.size===0)return;
  const indices=[...selected];
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:[612,850]});
  for(let i=0;i<indices.length;i++){
    const c=customers[indices[i]];
    showProgress(true,`Processing ${i+1}/${indices.length}: ${c.name}`,Math.round((i/indices.length)*100));
    await new Promise(r=>setTimeout(r,50));
    await renderToPDF(c,doc,i>0);
  }
  showProgress(true,'Saving PDF...',100);
  await new Promise(r=>setTimeout(r,200));
  const label=indices.length===1?`${customers[indices[0]].id} - ${customers[indices[0]].name}`:`Atvian_Invoices_${indices.length}_customers`;
  doc.save(`${label}.pdf`);
  showProgress(false);
}

function showProgress(show,txt='',pct=0){
  const ov=document.getElementById('progressOverlay');
  ov.classList.toggle('show',show);
  if(show){
    document.getElementById('progressTxt').textContent=txt;
    document.getElementById('progressFill').style.width=pct+'%';
  }
}
